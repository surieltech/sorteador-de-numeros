<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Sorteador de Números</title>
    
</head>
<body>
    <div class="container">
        <h2>Sorteador de Números</h2>

        <div class="input-group">
            <div class="input-field">
                <label for="min">Mín:</label>
                <input type="number" name="min" id="min" value="1" placeholder="1">
            </div>
            <div class="input-field">
                <label for="max">Max:</label>
                <input type="number" name="max" id="max" value="100" placeholder="100">
            </div>
        </div>

        <button id="generate">Sortear Número</button>

        <div id="result">
            <span>000</span>
        </div>

        <div class="history">
            <h3>Últimos números sorteados (clique para repetir):</h3>
            <div id="historyList"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
